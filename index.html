<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>在坐的都是渣渣</title>
    <style type="text/css">
      *{
          margin: 0;
          padding: 0;
      }
      html,body{
          width: 100%;
          height: 100%;
      }
      .box{
          width:100%;
          height: 100%;
          display: flex;
            align-items: center;
      }
      .box img{
          display: flex;
          align-items: center;
          width: 100%;
      }
    </style>
</head>
<body>
    <div class="box" id="box">  
        <img src="img/2.gif" alt="">
    </div>
    <script src="https://cdn.bootcss.com/jquery/3.4.1/jquery.js"></script>
  <script type="text/javascript">
     function rgb(){//rgb颜色随机
			var r = Math.floor(Math.random()*256);
			var g = Math.floor(Math.random()*256);
			var b = Math.floor(Math.random()*256);
			var rgb = '('+r+','+g+','+b+')';
			return rgb;
		}
        $(document).ready(function (){
            setInterval(()=>{
                $('#box').css('background-color','rgb'+rgb())
        })
        
    })
    </script>
</body>
</html>
